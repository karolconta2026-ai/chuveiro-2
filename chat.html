<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HOMEDECOR - Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f5f5f5;
      min-height: 100vh;
    }
    #root { width: 100%; margin: 0 auto; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
    @media (min-width: 768px) {
      body { display: flex; justify-content: center; align-items: flex-start; padding: 20px 0; background: #e5e7eb; }
      #root { width: 480px; max-width: 480px; min-height: 90vh; box-shadow: 0 0 30px rgba(0,0,0,0.15); }
    }

    /* Top bar */
    .chat-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: #ffffff; border-bottom: 1px solid #f1f1f1;
      position: sticky; top: 0; z-index: 10;
    }
    .chat-topbar .back { background: none; border: 0; cursor: pointer; padding: 4px; color: #111827; }
    .chat-topbar .title { font-size: 16px; font-weight: 600; color: #111827; }
    .chat-topbar .cart { position: relative; cursor: pointer; color: #111827; }
    .chat-topbar .cart .count {
      position: absolute; top: -6px; right: -8px; background: #FE2C55; color: #fff;
      font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }

    /* Store header */
    .chat-store {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: #fff; border-bottom: 1px solid #f1f1f1;
    }
    .chat-store-logo {
      width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: #FE2C55;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-store-logo img { width: 100%; height: 100%; object-fit: cover; }
    .chat-store-name { font-size: 16px; font-weight: 700; color: #111827; }
    .chat-store-status { font-size: 13px; color: #9ca3af; margin-top: 2px; }

    /* Messages */
    .chat-body {
      flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    }
    .msg-row { display: flex; }
    .msg-row.bot { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }
    .msg-bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 14px;
      font-size: 14px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 1px rgba(0,0,0,0.03);
    }
    .msg-row.bot .msg-bubble { background: #ffffff; color: #111827; border-bottom-left-radius: 4px; }
    .msg-row.user .msg-bubble { background: #FE2C55; color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 11px; opacity: 0.7; display: block; text-align: right; margin-top: 4px; }

    .faq-label { font-size: 13px; color: #6b7280; padding: 4px 2px; margin-top: 4px; }
    .faq-list { display: flex; flex-direction: column; gap: 8px; }
    .faq-btn {
      background: #fff; border: 1px solid #FE2C55; color: #FE2C55;
      padding: 12px 16px; border-radius: 999px; font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: left; transition: background 0.15s;
    }
    .faq-btn:hover { background: #fff5f7; }
    .faq-btn:disabled { opacity: 0.5; cursor: default; }

    .typing { display: inline-flex; gap: 4px; padding: 12px 14px; background: #fff; border-radius: 14px; border-bottom-left-radius: 4px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #c4c4c4; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

    /* Composer */
    .chat-composer {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      background: #fff; border-top: 1px solid #f1f1f1; position: sticky; bottom: 0;
    }
    .chat-composer input {
      flex: 1; border: 1px solid #e5e7eb; background: #fff; border-radius: 999px;
      padding: 12px 16px; font-size: 14px; outline: none;
    }
    .chat-composer input:focus { border-color: #FE2C55; }
    .chat-composer .send {
      width: 40px; height: 40px; border-radius: 50%; background: #d1d5db;
      border: 0; display: flex; align-items: center; justify-content: center; cursor: pointer;
      color: #fff; transition: background 0.15s;
    }
    .chat-composer .send.active { background: #FE2C55; }

      <div>
        <div class="chat-store-name" id="chat-store-name">HOMEDECOR</div>
        <div class="chat-store-status">Online</div>
      </div>
    </div>

    <div class="chat-body" id="chat-body"></div>

    <form class="chat-composer" id="chat-form" autocomplete="off">
      <input type="text" id="chat-input" placeholder="Digite uma mensagem..." />
      <button type="submit" class="send" id="chat-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </form>
  </div>

  <script>
    (function () {
      var body = document.getElementById('chat-body');
      var form = document.getElementById('chat-form');
      var input = document.getElementById('chat-input');
      var sendBtn = document.getElementById('chat-send');

      // Hydrate store name/logo if available
      try {
        var sn = (window.__STORE_NAME__) || document.title.replace(/\s*-\s*Chat$/i, '');
        if (sn) {
          document.getElementById('chat-store-name').textContent = sn;
          document.title = sn + ' - Chat';
        }
        if (window.__STORE_LOGO__) document.getElementById('chat-store-logo').src = window.__STORE_LOGO__;
      } catch (e) {}

      // Cart count from localStorage if present
      try {
        var raw = localStorage.getItem('cart');
        if (raw) {
          var arr = JSON.parse(raw);
          var total = Array.isArray(arr) ? arr.reduce(function (s, i) { return s + (i.quantity || i.qty || 1); }, 0) : 0;
          document.getElementById('chat-cart-count').textContent = String(total);
        }
      } catch (e) {}

      function nowHHMM() {
        var d = new Date();
        return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
      }

      function scrollBottom() {
        requestAnimationFrame(function () { body.scrollTop = body.scrollHeight; });
      }

      function addBot(text) {
        var row = document.createElement('div');
        row.className = 'msg-row bot';
        row.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '<span class="msg-time">' + nowHHMM() + '</span></div>';
        body.appendChild(row);
        scrollBottom();
      }
      function addUser(text) {
        var row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '<span class="msg-time">' + nowHHMM() + '</span></div>';
        body.appendChild(row);
        scrollBottom();
      }
      function addTyping() {
        var row = document.createElement('div');
        row.className = 'msg-row bot';
        row.id = '__typing__';
        row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        body.appendChild(row);
        scrollBottom();
      }
      function removeTyping() {
        var t = document.getElementById('__typing__');
        if (t) t.remove();
      }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
        });
      }

      var storeName = document.getElementById('chat-store-name').textContent || 'nossa loja';

      var faqs = [
        { q: 'Como faço meu pedido?', a: 'Para fazer seu pedido é simples: 1) Escolha o produto desejado; 2) Selecione a variação (cor/tamanho) e a quantidade; 3) Clique em "Comprar agora" ou adicione ao carrinho; 4) Finalize o pagamento via Pix. Pronto! Seu pedido será confirmado automaticamente.' },
        { q: 'Qual o prazo de entrega?', a: 'O prazo de entrega varia de 3 a 10 dias úteis após a confirmação do pagamento, dependendo da sua região. Você receberá o código de rastreio por e-mail/SMS assim que o pedido for postado.' },
        { q: 'Como funciona a troca/devolução?', a: 'Você tem até 7 dias após o recebimento para solicitar troca ou devolução, conforme o Código de Defesa do Consumidor. O produto deve estar sem uso, na embalagem original. Entre em contato com nosso atendimento para iniciar o processo.' },
        { q: 'Quais formas de pagamento?', a: 'Aceitamos pagamento via Pix (aprovação imediata e com desconto especial). É a forma mais rápida e segura de garantir seu produto.' },
        { q: 'Como rastrear meu pedido?', a: 'Após a confirmação do pagamento, em até 2 dias úteis você receberá o código de rastreio por e-mail e SMS. Com ele, basta acessar o site dos Correios ou da transportadora para acompanhar a entrega em tempo real.' },
        { q: 'Como entrar na minha conta?', a: 'No momento, nossas compras são realizadas como visitante — você não precisa criar conta. Todos os dados do pedido são enviados para o e-mail informado no checkout.' },
        { q: 'Falar com atendente', a: 'Um de nossos atendentes entrará em contato pelo e-mail informado na sua compra em até 24h úteis. Para urgências, descreva sua dúvida abaixo que tentaremos ajudar por aqui.' }
      ];

      function renderFAQ() {
        var wrap = document.createElement('div');
        wrap.className = 'msg-row bot';
        wrap.id = '__faq__';
        var inner = document.createElement('div');
        inner.style.width = '100%';
        var label = document.createElement('div');
        label.className = 'faq-label';
        label.textContent = 'Dúvidas frequentes:';
        inner.appendChild(label);
        var list = document.createElement('div');
        list.className = 'faq-list';
        faqs.forEach(function (f) {
          var btn = document.createElement('button');
          btn.className = 'faq-btn';
          btn.textContent = f.q;
          btn.addEventListener('click', function () {
            handleAsk(f.q, f.a);
          });
          list.appendChild(btn);
        });
        inner.appendChild(list);
        wrap.appendChild(inner);
        body.appendChild(wrap);
        scrollBottom();
      }

      function handleAsk(question, answer) {
        addUser(question);
        addTyping();
        setTimeout(function () {
          removeTyping();
          addBot(answer);
        }, 700 + Math.random() * 500);
      }

      function matchAnswer(text) {
        var t = text.toLowerCase();
        if (/(pedid|comprar|fazer)/.test(t)) return faqs[0].a;
        if (/(prazo|entrega|chega|dias)/.test(t)) return faqs[1].a;
        if (/(troca|devolu|reembol)/.test(t)) return faqs[2].a;
        if (/(pagamento|pix|cart[aã]o|boleto)/.test(t)) return faqs[3].a;
        if (/(rastre|c[oó]digo|onde|seguir)/.test(t)) return faqs[4].a;
        if (/(conta|login|cadastr)/.test(t)) return faqs[5].a;
        if (/(atendente|humano|falar|suport)/.test(t)) return faqs[6].a;
        return 'Obrigado pela mensagem! Um atendente da ' + storeName + ' responderá em breve. Enquanto isso, confira as dúvidas frequentes acima 👆';
      }

      // Initial messages
      addBot('Olá! Bem-vindo à ' + storeName + '. Como posso ajudar você hoje?');
      setTimeout(renderFAQ, 200);

      // Composer
      input.addEventListener('input', function () {
        if (input.value.trim()) sendBtn.classList.add('active');
        else sendBtn.classList.remove('active');
      });
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var v = input.value.trim();
        if (!v) return;
        input.value = '';
        sendBtn.classList.remove('active');
        addUser(v);
        addTyping();
        setTimeout(function () {
          removeTyping();
          addBot(matchAnswer(v));
        }, 800 + Math.random() * 500);
      });
