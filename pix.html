<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento PIX - Casa Prática</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #F5F5F5;
      min-height: 100vh;
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      background: #F5F5F5;
    }
    
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        padding: 20px 0;
        background-color: #F5F5F5;
      }
      
      #root {
        max-width: 480px;
        box-shadow: 0 0 30px rgba(0,0,0,0.15);
        background: #F5F5F5;
      }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid transparent;
      border-top-color: #FE2C55;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    #refresh-warning-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    .refresh-warning-popup {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      text-align: center;
      margin: 16px;
    }
    
    .refresh-warning-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .refresh-warning-popup h3 {
      color: #111827;
      margin: 0 0 12px 0;
      font-size: 20px;
    }
    
    .refresh-warning-popup p {
      color: #6B7280;
      margin: 0 0 8px 0;
      font-size: 14px;
    }
    
    .refresh-warning-popup p.small {
      font-size: 12px;
      color: #9CA3AF;
    }
    
    .refresh-warning-popup button {
      background: #FE2C55;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
  </style>
<!-- TikTok Pixel -->
<script>

<body>
  

  <div id="root">
    <div id="loading" style="background-color: #F5F5F5; min-height: 100vh;">
      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3" style="background-color: #FFFFFF;">
            <button onclick="return false" class="p-1" style="opacity:0.4;pointer-events:none;">
          <img src="assets/back-arrow.png" alt="Voltar" class="h-5 w-auto" style="object-fit: contain;" draggable="false" />
        </button>
        <span class="font-medium" style="color: #111827;">Código do pagamento</span>
        <div style="width: 24px;"></div>
      </div>
      <!-- Loading content -->
      <div class="flex flex-col items-center justify-center p-4" style="padding-top: 120px;">
        <div class="spinner"></div>
        <p class="mt-4" style="color: #6B7280;">Gerando pagamento...</p>
      </div>
    </div>
    <div id="payment-content" style="display: none;"></div>
    <div id="error-content" style="display: none;"></div>
  </div>
  
  <script>
    const PUBLIC_KEY = "vennoxpay_live_3KfnMyzecH7HueoJINHGCCh64xRaJB2o";
    const SECRET_KEY = "";
    const GATEWAY_CONFIG_TOKEN = "df74b574826d45e7865535986956a30bedded10394de4b3ab7e1cdbb014bcbfe";
    const GATEWAY = "vennoxpay";
    const PRODUCT_TITLE = "Camiseta Oversized Streetwear";
    const UTMIFY_API_TOKEN = "";
    const TIKTOK_PIXEL_ID = "D848SE3C77UDS4G4KGIG";
    const PIXEL_TYPE = "tiktokAds";
    const TRACK_COMPLETE_PAYMENT = true;
    const UPSELL_URL = "";
    
    // Pegar valor do URL (com fallback para localStorage, caso a navegação seja interceptada e perca a query string)
    const urlParams = new URLSearchParams(window.location.search);
    let totalAmount = parseFloat(urlParams.get('amount') || '0');
    if (!totalAmount || totalAmount <= 0) {
      try { totalAmount = parseFloat(localStorage.getItem('pixAmount') || '0'); } catch(e) {}
    }

    // Helper: lê cartItems de múltiplas fontes (window.name, sessionStorage,
    // localStorage) e re-hidrata o localStorage para o restante do código.
    function __readCartRobust() {
      var sources = [];
      try {
        if (typeof window.name === 'string' && window.name.indexOf('__cart__:') === 0) {
          sources.push(window.name.slice('__cart__:'.length));
        }
      } catch (e) {}
      try { sources.push(sessionStorage.getItem('cartItems')); } catch (e) {}
      try { sources.push(localStorage.getItem('cartItems')); } catch (e) {}
      for (var i = 0; i < sources.length; i++) {
        var raw = sources[i];
        if (!raw) continue;
        try {
          var parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) {
            try { localStorage.setItem('cartItems', JSON.stringify(parsed)); } catch (e) {}
            try { sessionStorage.setItem('cartItems', JSON.stringify(parsed)); } catch (e) {}
            return parsed;
          }
        } catch (e) {}
      }
      return [];
    }
    // Re-hidrata cartItems o quanto antes para que todo o pix.html veja o carrinho.
    try { __readCartRobust(); } catch (e) {}

    // ⚠️ Salvaguarda: recalcula o total a partir do carrinho (preço × quantidade) +
    // o frete salvo pelo checkout. Se o valor calculado for maior que o recebido
    // por URL/localStorage (combo + quantidade não foi propagado corretamente),
    // usamos o valor recalculado para garantir que o gateway cobre o real.
    try {
      const __cart = JSON.parse(localStorage.getItem('cartItems') || '[]')
        .filter(it => it && it.selected !== false && it.price !== undefined);
      const itemsSum = __cart.reduce((s, it) => s + (Number(it.price) || 0) * (Number(it.quantity) || 1), 0);
      const shipSaved = parseFloat(localStorage.getItem('pixShipping') || '0') || 0;
      const computed = Math.round((itemsSum + shipSaved) * 100) / 100;
      if (computed > 0 && (!totalAmount || computed > totalAmount + 0.01)) {
        console.warn('[PIX] Ajustando total: URL=' + totalAmount + ' → carrinho=' + computed);
        totalAmount = computed;
        try { localStorage.setItem('pixAmount', computed.toFixed(2)); } catch(e) {}
      }
    } catch(e) { console.error('[PIX] Falha ao recalcular total do carrinho:', e); }
    
    // Timer de 30 minutos
    let timeLeft = 30 * 60;
    let timerInterval;
    let statusInterval;
    let paymentId = null;
    let paymentPending = true;

    // Cache do PIX para sobreviver a refresh
    const PIX_CACHE_KEY = 'pix_payment_cache_v1';

    function getNavigationTypeSafe() {
      try {
        const navEntries = performance.getEntriesByType && performance.getEntriesByType('navigation');
        return navEntries && navEntries[0] && navEntries[0].type ? navEntries[0].type : null;
      } catch (e) {
        return null;
      }
    }

    function loadPixCache() {
      try {
        const raw = sessionStorage.getItem(PIX_CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function savePixCache(pixCode, qrCodeUrl) {
      try {
        if (!paymentId || !pixCode) return;
        const expiresAt = Date.now() + (timeLeft * 1000);
        sessionStorage.setItem(PIX_CACHE_KEY, JSON.stringify({
          paymentId: paymentId,
          pixCode: pixCode,
          qrCodeUrl: qrCodeUrl,
          amount: totalAmount,
          expiresAt: expiresAt
        }));
      } catch (e) {
        // ignore
      }
    }

    function clearPixCache() {
      try {
        sessionStorage.removeItem(PIX_CACHE_KEY);
      } catch (e) {
        // ignore
      }
    }
    
    // Handler para prevenir refresh/saída
    function beforeUnloadHandler(e) {
      if (paymentPending) {
        e.preventDefault();
        e.returnValue = 'Você tem um pagamento PIX pendente. Se sair, precisará gerar um novo código. Deseja realmente sair?';
        return e.returnValue;
      }
    }
    
    // Adicionar listener ao carregar
    window.addEventListener('beforeunload', beforeUnloadHandler);
    window.onbeforeunload = beforeUnloadHandler;
    
    // Interceptar teclas de refresh (F5, Ctrl+R, Cmd+R)
    document.addEventListener('keydown', function(e) {
      if (paymentPending) {
        const key = (e.key || '').toString();
        if (key === 'F5' || ((e.ctrlKey || e.metaKey) && key.toLowerCase() === 'r')) {
          e.preventDefault();
          showRefreshWarning();
          return false;
        }
      }
    });
    
    function showRefreshWarning(title, message, subMessage) {
      if (document.getElementById('refresh-warning-overlay')) return;
      
      const overlay = document.createElement('div');
      overlay.id = 'refresh-warning-overlay';
      overlay.innerHTML = `
        <div class="refresh-warning-popup">
          <div class="refresh-warning-icon">⚠️</div>
          <h3>${title || 'Aguarde o pagamento!'}</h3>
          <p>${message || 'Não é possível atualizar a página enquanto o pagamento estiver pendente.'}</p>
          <p class="small">${subMessage || 'Após efetuar o PIX, aguarde a confirmação automática.'}</p>
          <button onclick="closeRefreshWarning()">Entendi</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }
    
    function closeRefreshWarning() {
      const overlay = document.getElementById('refresh-warning-overlay');
      if (overlay) overlay.remove();
    }
    
    
    // Function to notify Utmify about sale status
    async function notifyUtmify(saleStatus) {
      if (!UTMIFY_API_TOKEN || PIXEL_TYPE !== 'utmify') return;
      
      try {
        const addressData = JSON.parse(localStorage.getItem('checkoutAddress') || '{}');
        const cpf = localStorage.getItem('checkoutCpf') || '';
        const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        const productName = cartItems[0]?.title || 'Produto';
        const productId = 'PROD_' + Date.now();
        
        await fetch('https://poklmhgqebfdgaxapaxr.supabase.co/functions/v1/utmify-notify-sale', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apiToken: UTMIFY_API_TOKEN,
            orderId: paymentId || 'order_' + Date.now(),
            status: saleStatus,
            amount: totalAmount,
            productName: productName,
            productId: productId,
            customer: {
              name: addressData.nome || '',
              email: addressData.email || '',
              phone: addressData.telefone || '',
              document: cpf
            },
            utmParams: {
              utm_source: urlParams.get('utm_source') || '',
              utm_medium: urlParams.get('utm_medium') || '',
              utm_campaign: urlParams.get('utm_campaign') || '',
              utm_content: urlParams.get('utm_content') || '',
              utm_term: urlParams.get('utm_term') || ''
            }
          })
        });
        console.log('[PIX] Utmify notified:', saleStatus);
      } catch (error) {
        console.error('[PIX] Error notifying Utmify:', error);
      }
    }
    
    // Function to fire TikTok pixel event with value/currency/contents (required for conversions)
    function fireTikTokPixelEvent(eventName) {
      if (PIXEL_TYPE !== 'tiktokAds' || !TRACK_COMPLETE_PAYMENT) return;
      try {
        if (window.ttq && typeof window.ttq.track === 'function') {
          var items = [];
          try { items = JSON.parse(localStorage.getItem('cartItems') || '[]'); } catch(e) {}
          var contents = items.length > 0
            ? items.map(function(it){ return {
                content_id: String(it.id || it.title || 'product'),
                content_type: 'product',
                content_name: String(it.title || 'Produto'),
                quantity: Number(it.quantity || 1),
                price: Number(it.price || 0),
              }; })
            : [{ content_id: 'product', content_type: 'product', content_name: PRODUCT_TITLE || 'Produto', quantity: 1, price: Number(totalAmount) || 0 }];
          var eventId = 'evt_' + (paymentId || Date.now()) + '_' + Math.random().toString(36).slice(2, 8);
          window.ttq.track(eventName, {
            value: Number(totalAmount) || 0,
            currency: 'BRL',
            contents: contents,
          }, { event_id: eventId });
          console.log('[PIX] TikTok pixel event fired:', eventName, { value: totalAmount, event_id: eventId });
        } else {
          console.warn('[PIX] TikTok ttq not loaded; CompletePayment not sent');
        }
      } catch (error) {
        console.error('[PIX] Error firing TikTok pixel:', error);
      }
    }
    
    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      return hours.toString().padStart(2, '0') + ':' + mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }
    
    function updateTimer() {
      const timerEl = document.getElementById('countdown-timer');
      if (timerEl) {
        timerEl.textContent = formatTime(timeLeft);
      }
      timeLeft--;
      if (timeLeft < 0) {
        clearInterval(timerInterval);
        showError('Tempo expirado. Por favor, tente novamente.');
      }
    }
    
    function showError(message) {
      paymentPending = false;
      window.removeEventListener('beforeunload', beforeUnloadHandler);
      window.onbeforeunload = null;
      clearPixCache();
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('payment-content').style.display = 'none';
      document.getElementById('error-content').style.display = 'block';
      document.getElementById('error-content').innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-screen p-4 text-center" style="background-color: #F5F5F5;">
          <p style="color: #EF4444;">Erro ao gerar pagamento</p>
          <p class="mt-2 text-sm" style="color: #6B7280;">${message}</p>
          <button onclick="window.location.href='checkout.html'" class="mt-4 px-6 py-2 rounded-lg" style="background-color: #FE2C55; color: #FFFFFF;">
            Tentar novamente
          </button>
        </div>
      `;
    }
    
    function showSuccess() {
      paymentPending = false;
      window.removeEventListener('beforeunload', beforeUnloadHandler);
      window.onbeforeunload = null;
      clearPixCache();
      
      clearInterval(timerInterval);
      clearInterval(statusInterval);
      
      
      // Fire TikTok pixel CompletePayment event (and also Purchase as alias for newer dashboards)
      fireTikTokPixelEvent('CompletePayment');
      fireTikTokPixelEvent('Purchase');

      // Notify Utmify about approved payment
      notifyUtmify('approved');

      // Limpar carrinho
      localStorage.removeItem('cartItems');

      // Redirect to upsell URL if configured, otherwise show thank you page.
      // Delay so the TikTok pixel beacon has time to leave before navigation.
      if (UPSELL_URL && UPSELL_URL.trim() !== '') {
        let redirectUrl = UPSELL_URL.trim();
        if (!redirectUrl.startsWith('http://') && !redirectUrl.startsWith('https://')) {
          redirectUrl = 'https://' + redirectUrl;
        }
        setTimeout(function(){ window.location.href = redirectUrl; }, 1200);
        return;
      }
      
      // Show default thank you page
      document.getElementById('payment-content').innerHTML = `
        <div class="flex flex-col items-center justify-center py-16 px-4">
          <div class="w-20 h-20 rounded-full flex items-center justify-center mb-6" style="background-color: #10B981;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2 class="text-2xl font-bold mb-2" style="color: #111827;">Pagamento Confirmado!</h2>
          <p class="text-center mb-6" style="color: #6B7280;">Obrigado pela sua compra. Seu pedido foi processado com sucesso.</p>
          <button onclick="window.location.href='index.html'" class="px-8 py-3 rounded-lg font-medium" style="background-color: #FE2C55; color: #FFFFFF;">
            Voltar à loja
          </button>
        </div>
      `;
    }
    
    function renderPaymentScreen(pixCode, qrCodeUrl) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('payment-content').style.display = 'block';
      savePixCache(pixCode, qrCodeUrl);

      // Pixel: PlaceAnOrder quando o QR Code PIX é gerado
      try {
        if (window.ttq && typeof window.ttq.track === 'function' && PIXEL_TYPE === 'tiktokAds') {
          const items = JSON.parse(localStorage.getItem('cartItems') || '[]');
          window.ttq.track('PlaceAnOrder', {
            value: Number(totalAmount) || 0,
            currency: 'BRL',
            contents: items.length > 0
              ? items.map(it => ({
                  content_id: String(it.id || it.title || 'product'),
                  content_name: String(it.title || 'Produto'),
                  quantity: Number(it.quantity || 1),
                  price: Number(it.price || 0),
                }))
              : [{ content_id: 'product', content_name: PRODUCT_TITLE || 'Produto', quantity: 1, price: Number(totalAmount) || 0 }],
          });
          console.log('[Pixel] PlaceAnOrder fired (QR generated)');
        }
      } catch (e) { console.error('[Pixel] PlaceAnOrder error:', e); }

      // Dispara evento de compra (CompletePayment + Purchase) assim que o QR é gerado,
      // mesmo que o PIX ainda esteja pendente.
      try {
        fireTikTokPixelEvent('CompletePayment');
        fireTikTokPixelEvent('Purchase');
      } catch (e) { console.error('[Pixel] CompletePayment on QR error:', e); }
      
      document.getElementById('payment-content').innerHTML = `
        <div style="background-color: #F5F5F5; min-height: 100vh; padding-bottom: 20px;">
          <!-- Header -->
          <div class="flex items-center justify-between px-4 py-3" style="background-color: #FFFFFF;">
            <button onclick="return false" class="p-1" style="opacity:0.4;pointer-events:none;">
              <img src="assets/back-arrow.png" alt="Voltar" class="h-5 w-auto" style="object-fit: contain;" draggable="false" />
            </button>
            <span class="font-medium" style="color: #111827;">Código do pagamento</span>
            <div style="width: 24px;"></div>
          </div>
          
          <!-- Info Section -->
          <div class="px-4 pt-4 pb-3 flex items-start justify-between">
            <div>
              <p class="text-lg font-medium" style="color: #111827;">Aguardando o pagamento</p>
              <p class="text-2xl font-bold mt-1" style="color: #111827;">R$ ${totalAmount.toFixed(2).replace('.', ',')}</p>
              <div class="flex items-center gap-2 mt-2">
                <span class="text-sm" style="color: #6B7280;">Vence em</span>
                <span class="flex items-center gap-1 px-2 py-0.5 rounded text-sm font-medium" style="background-color: #EF4444; color: #FFFFFF;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                    <path stroke-width="2" d="M12 6v6l4 2"/>
                  </svg>
                  <span id="countdown-timer">${formatTime(timeLeft)}</span>
                </span>
              </div>
            </div>
            <!-- Orange circle icon -->
            <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #FB923C;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
              </svg>
            </div>
          </div>

          <!-- PIX Card -->
          <div class="mx-4 mb-4 rounded-xl overflow-hidden shadow-sm" style="background-color: #FFFFFF;">
            <!-- Pix Header -->
            <div class="flex items-center gap-2 px-4 py-3" style="border-bottom: 1px solid #E5E7EB;">
              <svg width="24" height="24" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#4DB6AC" d="M242.4 292.5C247.8 287.1 257.1 287.1 262.5 292.5L339.5 369.5C353.7 383.7 372.6 391.5 392.6 391.5H407.7L310.6 488.6C280.3 518.1 231.1 518.1 200.8 488.6L103.3 391.2H112.6C132.6 391.2 151.5 383.4 165.7 369.2L242.4 292.5zM262.5 218.9C257.1 224.4 247.7 224.5 242.4 218.9L165.7 142.2C151.5 127.1 132.6 120.2 112.6 120.2H103.3L200.7 22.76C231.1-7.586 280.3-7.586 310.6 22.76L407.8 119.9H392.6C372.6 119.9 353.7 127.7 339.5 141.9L262.5 218.9zM112.6 142.7C126.4 142.7 139.1 148.3 149.7 158.1L226.4 234.8C233.6 241.1 243 245.7 252.5 245.7C261.9 245.7 271.3 241.1 278.5 234.8L355.5 157.8C365.3 148.1 378.8 142.5 392.6 142.5H430.3L488.6 200.8C518.1 231.1 518.1 280.3 488.6 310.6L430.3 368.9H392.6C378.8 368.9 365.3 363.3 355.5 353.5L278.5 276.5C264.6 262.6 240.3 262.6 226.4 276.6L149.7 353.2C139.1 363 126.4 368.6 112.6 368.6H80.78L22.76 310.6C-7.586 280.3-7.586 231.1 22.76 200.8L80.78 142.7H112.6z"></path>
              </svg>
              <span class="font-medium" style="color: #111827;">Pix</span>
            </div>

            <!-- QR Code -->
            <div class="flex justify-center py-6">
              <img src="${qrCodeUrl}" alt="QR Code PIX" class="w-40 h-40" />
            </div>

            <!-- PIX Code -->
            <div class="px-4 pb-4">
              <p class="text-xs break-all text-center leading-relaxed" style="color: #6B7280; word-break: break-all;">${pixCode}</p>
            </div>

    function copyPixCode(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert('Código PIX copiado!');
      }).catch(() => {
        // Fallback para navegadores antigos
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('Código PIX copiado!');
      });
    }

    async function createPayment() {
      // SigmaPay only needs apiToken (stored in SECRET_KEY)
      if (GATEWAY === 'sigmapay') {
        if (!SECRET_KEY) {
          showError('Token de API não configurado.');
          return;
        }
      } else if (GATEWAY === 'blackout' || GATEWAY === 'blackcat' || GATEWAY === 'ironpay' || GATEWAY === 'freepay' || GATEWAY === 'vennoxpay' || GATEWAY === 'simps') {
        if (!GATEWAY_CONFIG_TOKEN) {
          showError('Configuração de pagamento não salva.');
          return;
        }
      } else if (!PUBLIC_KEY || !SECRET_KEY) {
        showError('Chaves de pagamento não configuradas.');
        return;
      }
      
      if (totalAmount <= 0) {
        showError('Valor inválido.');
        return;
      }
      
      if ((GATEWAY === 'sigmapay' || GATEWAY === 'blackcat' || GATEWAY === 'blackout' || GATEWAY === 'ironpay' || GATEWAY === 'freepay' || GATEWAY === 'vennoxpay' || GATEWAY === 'simps') && totalAmount < 5) {
        showError('O valor mínimo para pagamento PIX é R$ 5,00');
        return;
      }
      
      try {
        // Get customer data from localStorage
        const addressData = JSON.parse(localStorage.getItem('checkoutAddress') || '{}');
        const cpf = localStorage.getItem('checkoutCpf') || '';
        
        // Validate email - must contain @ symbol
        const customerEmail = addressData.email || '';
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(customerEmail)) {
          showError('E-mail inválido. Por favor, volte ao checkout e corrija seu e-mail.');
          return;
        }
        
        const customerAddress = {
          street: addressData.endereco || '',
          number: addressData.numero || '',
          complement: addressData.complemento || '',
          neighborhood: addressData.bairro || '',
          city: addressData.cidade || '',
          state: addressData.estado || '',
          zipCode: addressData.cep || ''
        };
        
        // Get cart items
        const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        // Fallback inteligente para o título: usa o título do item; se vazio
        // ou genérico ("Produto"), tenta o título de qualquer outro item do
        // carrinho com nome real, depois o último produto visitado, depois
        // PRODUCT_TITLE e por fim "Produto".
        let lastProductTitle = '';
        try { lastProductTitle = localStorage.getItem('lastProductTitle') || ''; } catch (e) {}
        const firstNamedItem = (cartItems.find(i => i && typeof i.title === 'string' && i.title.trim() && i.title.trim() !== 'Produto') || {}).title || '';
        const titleFallback = firstNamedItem || lastProductTitle || PRODUCT_TITLE || 'Produto';
        const sourceItems = (Array.isArray(cartItems) && cartItems.length > 0)
          ? cartItems
          : [{ title: titleFallback, price: totalAmount, quantity: 1 }];
        const items = sourceItems.map(item => {
          const raw = (item && typeof item.title === 'string') ? item.title.trim() : '';
          const title = (raw && raw !== 'Produto') ? raw : titleFallback;
          return {
            title,
            unitPrice: item.price,
            quantity: item.quantity,
            tangible: true
          };
        });
        
        // SigmaPay uses Edge Function with dynamic product/offer creation
        if (GATEWAY === 'sigmapay') {
          const response = await fetch('https://poklmhgqebfdgaxapaxr.supabase.co/functions/v1/sigmapay-create-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

              apiToken: SECRET_KEY,

              productTitle: PRODUCT_TITLE,
              customerName: addressData.nome || '',
              customerEmail: customerEmail,
              customerDocument: cpf,
              customerPhone: addressData.telefone || ''
            })

              customerPhone: addressData.telefone || '',
              customerAddress: customerAddress,
              items: items
            })
          });
          const data = await response.json();
          console.log('FreePay resposta:', data);
          if (!response.ok || data.error) {
            throw new Error(data.error || 'Erro ao criar pagamento FreePay');
          }
          paymentId = data.id;
          const pixCode = data.copyPaste || '';
          let qrCodeUrl = data.qrCode || '';
          if (!qrCodeUrl && pixCode) {
            qrCodeUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(pixCode);
          }
          renderPaymentScreen(pixCode, qrCodeUrl);
          notifyUtmify('pending');
          statusInterval = setInterval(checkPaymentStatus, 3000);
          return;
        }

        // VennoxPay uses Edge Function with Basic Auth
        if (GATEWAY === 'vennoxpay') {
          const response = await fetch('https://poklmhgqebfdgaxapaxr.supabase.co/functions/v1/vennoxpay-create-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              configToken: GATEWAY_CONFIG_TOKEN,
              amount: totalAmount,
              customerName: addressData.nome || '',
              customerEmail: customerEmail,
              customerDocument: cpf,
              customerPhone: addressData.telefone || '',
              customerAddress: customerAddress,
              items: items,
              productTitle: (items[0] && items[0].title) || titleFallback || PRODUCT_TITLE || ''
            })
          });
          const data = await response.json();
          console.log('VennoxPay resposta:', data);
          if (!response.ok || data.error) {
            throw new Error(data.error || 'Erro ao criar pagamento VennoxPay');
          }
          paymentId = data.id;
          const pixCode = data.copyPaste || '';
          let qrCodeUrl = data.qrCode || '';
          if (!qrCodeUrl && pixCode) {
            qrCodeUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(pixCode);
          }
          renderPaymentScreen(pixCode, qrCodeUrl);
          notifyUtmify('pending');
          statusInterval = setInterval(checkPaymentStatus, 3000);
          return;
        }

        // Simps uses Edge Function with Basic Auth
        if (GATEWAY === 'simps') {
          const response = await fetch('https://poklmhgqebfdgaxapaxr.supabase.co/functions/v1/simps-create-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              configToken: GATEWAY_CONFIG_TOKEN,
              amount: totalAmount,
              customerName: addressData.nome || '',
              customerEmail: customerEmail,
              customerDocument: cpf,
              customerPhone: addressData.telefone || '',
              customerAddress: customerAddress,
              items: items,
              productTitle: (items[0] && items[0].title) || titleFallback || PRODUCT_TITLE || ''
            })
          });
          const data = await response.json();
          console.log('Simps resposta:', data);
          if (!response.ok || data.error) {
            throw new Error(data.error || 'Erro ao criar pagamento Simps');
          }
          paymentId = data.id;
          const pixCode = data.copyPaste || '';
          let qrCodeUrl = data.qrCode || '';
          if (!qrCodeUrl && pixCode) {
            qrCodeUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(pixCode);
          }
          renderPaymentScreen(pixCode, qrCodeUrl);
          notifyUtmify('pending');
          statusInterval = setInterval(checkPaymentStatus, 3000);
          return;
        }

        // BlackOut uses Basic Auth with publicKey:secretKey (default gateway)
        const response = await fetch('https://poklmhgqebfdgaxapaxr.supabase.co/functions/v1/blackout-create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            configToken: GATEWAY_CONFIG_TOKEN,
            amount: totalAmount,
            customerName: addressData.nome || '',
            customerEmail: customerEmail,
            customerDocument: cpf,
            customerPhone: addressData.telefone || '',
            customerAddress: customerAddress,
            items: items
          })
        });
        
        const data = await response.json();
        console.log('BlackOut resposta:', data);
        
        if (!response.ok || data.error) {
          throw new Error(data.error || 'Erro ao criar pagamento BlackOut');
        }
        
        paymentId = data.id;
        const pixCode = data.copyPaste || '';
        let qrCodeUrl = data.qrCode || '';
        
        // If qrCode is base64, use directly; otherwise generate QR from pixCode
        if (!qrCodeUrl || !qrCodeUrl.startsWith('data:')) {
          if (pixCode) {
            qrCodeUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(pixCode);
          }
        }
        
        renderPaymentScreen(pixCode, qrCodeUrl);
        notifyUtmify('pending');
        statusInterval = setInterval(checkPaymentStatus, 3000);
      } catch (error) {
        console.error('Erro ao criar pagamento:', error);
        showError(error.message || 'Erro ao gerar código PIX. Tente novamente.');
      }
    }
    
    function tryRestoreFromCache() {
      const cached = loadPixCache();
      if (!cached) return false;

      if (!cached.paymentId || !cached.pixCode || typeof cached.expiresAt !== 'number') {
        clearPixCache();
        return false;
      }

      if (cached.amount !== totalAmount) {
        return false;
      }

      if (Date.now() > cached.expiresAt) {
        clearPixCache();
        return false;
      }

      paymentId = cached.paymentId;
      timeLeft = Math.max(0, Math.floor((cached.expiresAt - Date.now()) / 1000));

      renderPaymentScreen(cached.pixCode, cached.qrCodeUrl || '');
      notifyUtmify('pending');
      statusInterval = setInterval(checkPaymentStatus, 3000);

      // Se foi um reload (toolbar/atalho), avisar e manter o mesmo PIX
      if (getNavigationTypeSafe() === 'reload') {
        showRefreshWarning(
          'Página atualizada',
          'Você atualizou esta página durante o pagamento.',
          'Não atualize novamente até concluir o pagamento.'
        );
      }

      return true;
    }

    function bootstrapPixFlow() {
      if (!tryRestoreFromCache()) {
        createPayment();
      }
    }

    // Iniciar quando a página carregar
    document.addEventListener('DOMContentLoaded', bootstrapPixFlow);
  </script>
