  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #F7F7F7;
      min-height: 100vh;
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      background: #F7F7F7;
      display: flex;
      flex-direction: column;
    }
    
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }
      
      #root {
        max-width: 480px;
        box-shadow: 0 0 30px rgba(0,0,0,0.15);
      }
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .accordion-content.open {
      max-height: 500px;
    }

    .rainbow-line {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 8px 0;
    }
    .rainbow-block {
      height: 4px;
      flex: 1;
    }
    .rainbow-red { background-color: #FE2C55; }
    .rainbow-cyan { background-color: #00D9FF; }

    /* Focus styles for inputs */
    .checkout-input:focus {
      outline: none;
      border: 1px solid #FE2C55 !important;
    }
    .checkout-input.has-value {
      border: 1px solid #FE2C55;
    }
    .checkout-input {
      border-radius: 6px;
    }

  <script>
    const Icon = (name, className = '') => {
      const span = document.createElement('span');
      span.className = className;
      span.innerHTML = window.__ICONS__[name];
      return span;
    };

    function parseMoney(value) {
      if (typeof value === 'number') return isFinite(value) ? value : 0;
      const raw = String(value ?? '').trim().replace(/[^0-9,.-]/g, '');
      if (!raw) return 0;
      const normalized = raw.includes(',') ? raw.replace(/\./g, '').replace(',', '.') : raw;
      const parsed = parseFloat(normalized);
      return isFinite(parsed) ? parsed : 0;
    }

    function lookupCartImage(item) {
      const map = window.__PRODUCT_IMAGE_MAP__ || {};
      const keys = [item && item.productId, item && item.id, item && item.slug, item && item.title];
      for (const key of keys) {
        if (key && map[String(key)]) return map[String(key)];
      }
      return '';
    }

    function readCartItems() {
      const sources = [];
      try {
        if (typeof window.name === 'string' && window.name.indexOf('__cart__:') === 0) {
          sources.push(window.name.slice('__cart__:'.length));
        }
      } catch (e) {}
      try {
        const params = new URLSearchParams(window.location.search || '');
        const fromUrl = params.get('cart');
        if (fromUrl) sources.push(fromUrl);
      } catch (e) {}
      try { sources.push(sessionStorage.getItem('cartItems')); } catch (e) {}
      try { sources.push(localStorage.getItem('cartItems')); } catch (e) {}
      try { if (window.__INIT_CART__ != null) sources.push(JSON.stringify(window.__INIT_CART__)); } catch (e) {}
      for (const raw of sources) {
        if (!raw) continue;
        try {
          const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (e) {}
      }
      return [];
    }

    // Carregar carrinho e aplicar desconto do back redirect se existir
    let cartItems = readCartItems()
      .filter(item => item && item.selected !== false && item.price !== undefined && item.price !== null)
      .map(item => ({
        ...item,
        price: parseMoney(item.price),
        originalPrice: parseMoney(item.originalPrice || item.price),
        quantity: parseInt(item.quantity) || 1,
        title: (item.title && item.title.trim() && item.title.trim() !== 'Produto')
          ? item.title
          : ((function(){ try { return localStorage.getItem('lastProductTitle') || ''; } catch(e){ return ''; } })() || item.title || 'Produto'),
        mainImage: item.mainImage || item.image || lookupCartImage(item) || '',
        image: item.image || item.mainImage || lookupCartImage(item) || '',
        variations: item.variations || {},
        selected: true,
      }));
    try {
      sessionStorage.setItem('cartItems', JSON.stringify(cartItems));
    } catch (e) {}
    try {
      localStorage.setItem('cartItems', JSON.stringify(cartItems));
    } catch (e) {}
    
    // Verificar se há desconto do back redirect aplicado - APENAS ao produto principal
    const appliedDiscount = JSON.parse(localStorage.getItem('appliedDiscount') || 'null');
    if (appliedDiscount && appliedDiscount.applied && appliedDiscount.price) {
      const mainProductId = appliedDiscount.mainProductId;
      const mainProductTitle = appliedDiscount.mainProductTitle;
      
      // Só aplicar desconto se tivermos identificador do produto principal
      if (mainProductId || mainProductTitle) {
        cartItems = cartItems.map(item => {
          // Aplicar desconto apenas ao produto principal
          const isMainProduct = (mainProductId && item.productId === mainProductId) || 
                                (mainProductTitle && item.title === mainProductTitle);
          
          if (isMainProduct) {
            return {
              ...item,
              price: appliedDiscount.price,
              originalPrice: item.originalPrice || item.price
            };
          }
          return item;
        });
        try { sessionStorage.setItem('cartItems', JSON.stringify(cartItems)); } catch (e) {}
        try { localStorage.setItem('cartItems', JSON.stringify(cartItems)); } catch (e) {}
      }
    }

    // Configuração de frete (usa valores do produto)
    const shippingMode = "auto";
    const freeShippingEnabled = true;
    const manualDaysMin = 2;
    const manualDaysMax = 5;
    const manualShippingValue = 0;

    // Função para calcular datas de entrega dinâmicas (baseado na configuração)
    function getDeliveryDateRange() {
      const today = new Date();
      const daysMin = shippingMode === 'manual' ? manualDaysMin : 2;
      const daysMax = shippingMode === 'manual' ? manualDaysMax : 5;
      
      const minDate = new Date(today);
      minDate.setDate(today.getDate() + daysMin);
      const maxDate = new Date(today);
      maxDate.setDate(today.getDate() + daysMax);
      
      const months = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
      
      const minDay = minDate.getDate();
      const minMonth = months[minDate.getMonth()];
      const maxDay = maxDate.getDate();
      const maxMonth = months[maxDate.getMonth()];
      
      return `Receba até ${minDay} de ${minMonth} - ${maxDay} de ${maxMonth}`;
    }

    // Gerar valor fixo de frete (0 se frete grátis; usa o valor configurado se houver; senão aleatório entre 1,50 e 4,50)
    const fixedShippingPrice = freeShippingEnabled ? '0,00' :
      (manualShippingValue > 0 ? manualShippingValue.toFixed(2).replace('.', ',') :
      (Math.random() * 3 + 1.5).toFixed(2).replace('.', ','));
    // Desconto de envio FIXO = diferença calculada com 1 item (taxa original - frete atual)
    const shippingDiscountFixed = 18.32 - parseFloat(fixedShippingPrice.replace(',', '.'));

    // Atualizar as datas de entrega após renderizar
    function updateDeliveryDates() {
      const dateElements = document.querySelectorAll('[id^="delivery-date-"]');
      const deliveryText = getDeliveryDateRange();
      dateElements.forEach(el => {
        el.textContent = deliveryText;
      });
    }

    // Estados dos accordions
    let addressExpanded = false;
    let cpfExpanded = false;
    let orderSummaryExpanded = false;
    let showAddressForm = false;
    let showMissingAddressPopup = false;
    let showMissingCpfPopup = false;

    // Funções para salvar dados - agora também salvam em tempo real no oninput
    function saveAddressData() {
      const addressData = {
        nome: document.getElementById('nome-input')?.value || '',
        telefone: document.getElementById('telefone-input')?.value || '',
        email: document.getElementById('email-input')?.value || '',
        cep: document.getElementById('cep-input')?.value || '',
        estado: document.getElementById('estado-select')?.value || '',
        cidade: document.getElementById('cidade-input')?.value || '',
        bairro: document.getElementById('bairro-input')?.value || '',
        endereco: document.getElementById('endereco-input')?.value || '',
        numero: document.getElementById('numero-input')?.value || '',
        complemento: document.getElementById('complemento-input')?.value || ''
      };
      localStorage.setItem('checkoutAddress', JSON.stringify(addressData));
      closeAddressForm();
    }

    // Função para salvar campo individual do endereço em tempo real
    function saveAddressField(fieldName, value) {
      const savedAddress = JSON.parse(localStorage.getItem('checkoutAddress') || '{}');
      savedAddress[fieldName] = value;
      localStorage.setItem('checkoutAddress', JSON.stringify(savedAddress));
    }

    function saveCpfData(value) {
      localStorage.setItem('checkoutCpf', value);
    }

    function updateInputStyle(input) {
      if (input.value) {
        input.classList.add('has-value');
      } else {
        input.classList.remove('has-value');
      }
    }

    // Timer
    let timeLeft = window.__CONFIG__.timerMinutes * 60;
    setInterval(() => {
      if (timeLeft > 0) timeLeft--;
      updateTimer();
    }, 1000);

    function updateTimer() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const timerEl = document.getElementById('timer');
      if (timerEl) {
        timerEl.textContent = 'Oferta Relâmpago termina em ' + mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
      }
    }

    function formatCPF(value) {
      const numbers = value.replace(/\D/g, '');
      if (numbers.length <= 11) {
        return numbers.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      }
      return value;
    }

    function formatCEP(value) {
      const numbers = value.replace(/\D/g, '');
      if (numbers.length <= 8) {
        return numbers.replace(/(\d{5})(\d{3})/, '$1-$2');
      }
      return value;
    }

    async function fetchAddressByCep(cepValue) {
      const numbers = cepValue.replace(/\D/g, '');
      if (numbers.length === 8) {
        try {
          console.log('Buscando CEP:', numbers);
          const response = await fetch(`https://viacep.com.br/ws/${numbers}/json/`);
          const data = await response.json();
          console.log('Dados do CEP:', data);
          if (!data.erro) {
            const estadoSelect = document.getElementById('estado-select');
            const cidadeInput = document.getElementById('cidade-input');
            const bairroInput = document.getElementById('bairro-input');
            const enderecoInput = document.getElementById('endereco-input');
            if (estadoSelect) {
              estadoSelect.value = data.uf;
              estadoSelect.style.color = '#111827';
              saveAddressField('estado', data.uf);
            }
            if (cidadeInput) {
              cidadeInput.value = data.localidade;
              cidadeInput.style.color = '#111827';
              cidadeInput.style.border = '1px solid #FE2C55';
              cidadeInput.classList.add('has-value');
              saveAddressField('cidade', data.localidade);
            }
            if (bairroInput && data.bairro) {
              bairroInput.value = data.bairro;
              bairroInput.style.color = '#111827';
              bairroInput.style.border = '1px solid #FE2C55';
              bairroInput.classList.add('has-value');
              saveAddressField('bairro', data.bairro);
            }
            if (enderecoInput && data.logradouro) {
              enderecoInput.value = data.logradouro;
              enderecoInput.style.color = '#111827';
              enderecoInput.style.border = '1px solid #FE2C55';
              enderecoInput.classList.add('has-value');
              saveAddressField('endereco', data.logradouro);
            }
          } else {
            console.error('CEP não encontrado');
          }
        } catch (error) {
          console.error('Erro ao buscar CEP:', error);
        }
      }
    }

    function handleCepInput(input) {
      const formatted = formatCEP(input.value);
      input.value = formatted;
      if (formatted.replace(/\D/g, '').length === 8) {
        fetchAddressByCep(formatted);
      }
    }

    function toggleAccordion(type) {
      if (type === 'address') {
        showAddressForm = true;
      } else if (type === 'cpf') {
        cpfExpanded = !cpfExpanded;
      } else if (type === 'summary') {
        orderSummaryExpanded = !orderSummaryExpanded;
      }
      renderPage();
    }

    function closeAddressForm() {
      showAddressForm = false;
      renderPage();
    }

    function calculateTotals() {
      const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      let totalQuantity = cartItems.reduce((sum, item) => sum + item.quantity, 0);
      
      // Desconto = 1 unidade de cada produto diferente no carrinho (não soma quantidade)
      const discountQuantity = cartItems.length;
      
      // Calcula preço original TOTAL somando o originalPrice de cada produto (1 unidade de cada)
      let totalOriginalPrice = 0;
      let totalCurrentPrice = 0;
      
      cartItems.forEach(item => {
        // Usar sempre o originalPrice salvo no carrinho (configurado na aba Básico)
        const itemOriginalPrice = item.originalPrice && item.originalPrice > item.price 
          ? item.originalPrice 
          : Math.round(item.price * 1.5 * 100) / 100;
        totalOriginalPrice += itemOriginalPrice; // 1 unidade de cada
        totalCurrentPrice += item.price; // 1 unidade de cada
      });
      
      // Desconto total = diferença entre original e atual
      const totalDiscount = totalOriginalPrice - totalCurrentPrice;
      
      // Cupons são baseados no desconto total
      const sellerCoupon = totalDiscount * 0.25;
      const tiktokCoupon = totalDiscount * 0.15;
      
      // Desconto no produto = diferença para fechar a conta
      const productDiscount = totalDiscount - sellerCoupon - tiktokCoupon;
      
      // Frete: usar os valores da área do produto - calcular por número de produtos únicos no carrinho
      const uniqueProductCount = cartItems.length;
      const currentShippingPriceUnit = parseFloat(fixedShippingPrice.replace(',', '.'));
      const originalShippingPriceUnit = 18.32;
      
      // Taxa e desconto multiplicam pelo número de produtos únicos (não pela quantidade total)
      const shippingOriginalTotal = originalShippingPriceUnit * uniqueProductCount;
      const shippingDiscountTotal = shippingDiscountFixed * uniqueProductCount;
      const shippingSubtotal = currentShippingPriceUnit * uniqueProductCount;
      
      const total = subtotal + shippingSubtotal;
      const savings = productDiscount + sellerCoupon + tiktokCoupon + shippingDiscountTotal;
      
      return { subtotal, total, savings, originalPrice: totalOriginalPrice, productDiscount, sellerCoupon, tiktokCoupon, shippingSubtotal, shippingOriginalTotal, shippingDiscountTotal, totalQuantity };
    }
    
    // Função para ir para página de pagamento PIX
    function goToPixPayment() {
      const { total } = calculateTotals();
      try {
        localStorage.setItem('pixAmount', total.toFixed(2));
        // Salva também o frete pago para o pix.html validar o total real (preço × qtd + frete).
        const { shippingSubtotal } = calculateTotals();
        localStorage.setItem('pixShipping', (shippingSubtotal || 0).toFixed(2));
      } catch(e){}
      // Pixel: AddPaymentInfo ao avançar para pagamento
      try {
        if (window.ttq && typeof window.ttq.track === 'function') {
          window.ttq.track('AddPaymentInfo', {
            value: Number(total) || 0,
            currency: 'BRL',
            contents: cartItems.map(it => ({
              content_id: String(it.id || it.title || 'product'),
              content_name: String(it.title || 'Produto'),
              quantity: Number(it.quantity || 1),
              price: Number(it.price || 0),
            })),
          });
          console.log('[Pixel] AddPaymentInfo fired');
        }
      } catch (e) { console.error('[Pixel] AddPaymentInfo error:', e); }
      // Persiste o carrinho também em sessionStorage e window.name
      // (defesa para contextos onde localStorage entre páginas falha, ex. file://).
      try {
        const slim = (cartItems || []).map(function(it){
          var c = {}; for (var k in it) if (Object.prototype.hasOwnProperty.call(it, k)) c[k] = it[k];
          if (typeof c.image === 'string' && c.image.indexOf('data:') === 0) c.image = '';
          if (typeof c.mainImage === 'string' && c.mainImage.indexOf('data:') === 0) c.mainImage = '';
          return c;
        });
        try { sessionStorage.setItem('cartItems', JSON.stringify(slim)); } catch(e) {}
        try { localStorage.setItem('cartItems', JSON.stringify(slim)); } catch(e) {}
        try { window.name = '__cart__:' + JSON.stringify(slim); } catch(e) {}
      } catch (e) {}
      window.location.href = 'pix.html?amount=' + total.toFixed(2);
    }

                      <img src="${item.mainImage}" alt="${item.title}" class="object-cover rounded-md flex-shrink-0" style="width: 80px; height: 80px;" onerror="this.onerror=null; this.style.background='#f3f4f6'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.outerHTML='<div style=\'width:80px;height:80px;background:#f3f4f6;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\'><svg xmlns=\'http://www.w3.org/2000/svg\' width=\'32\' height=\'32\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#9ca3af\' stroke-width=\'1.5\'><rect x=\'3\' y=\'3\' width=\'18\' height=\'18\' rx=\'2\'/><circle cx=\'8.5\' cy=\'8.5\' r=\'1.5\'/><path d=\'M21 15l-5-5L5 21\'/></svg></div>';" />
                      <div class="flex-1 min-w-0 flex flex-col">
                        <h3 class="font-normal mb-1" style="font-size: 13px; line-height: 18px; color: #000000; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${item.title}</h3>
                        <p class="font-medium mb-1" style="font-size: 12px; color: #6B6B6B;">
                          ${Object.keys(item.variations || {}).length > 0 
                            ? Object.values(item.variations).join(' ') 
                            : 'Padrão'}
                        </p>
                        <div class="flex items-center gap-1 mb-1">
                          <span style="font-size: 11px; color: #FFA500;">●</span>
                          <span style="font-size: 11px; color: #939393;">Devolução gratuita</span>
                        </div>
                        <!-- Preço e contador na mesma área -->
                        <div class="flex items-start justify-between" style="gap: 12px;">
                          <div class="flex flex-col" style="gap: 2px;">
                            <span class="font-bold" style="font-size: 17px; line-height: 1; color: #FE2C55;">
                              R$ ${item.price.toFixed(2).replace('.', ',')}
                            </span>
                            <div class="flex items-center" style="gap: 6px;">
                            <span class="line-through" style="font-size: 11px; color: #B8B8B8;">
                                R$ ${(item.originalPrice && item.originalPrice > item.price ? item.originalPrice : item.price).toFixed(2).replace('.', ',')}
                              </span>
                              <span style="font-size: 11px; color: #B8B8B8;">-${item.originalPrice && item.originalPrice > item.price ? Math.round((1 - item.price / item.originalPrice) * 100) : 0}%</span>
                            </div>
                          </div>
                          <!-- Contador alinhado à direita, na altura do preço vermelho -->
                          <div class="flex items-center" style="gap: 10px;">
                            <button onclick="handleQuantityChange(${itemIndex}, -1)" class="flex items-center justify-center rounded" style="width: 26px; height: 26px; border: 1px solid #E5E5E5; color: #000000; background-color: #FFFFFF;">
                              <span class="text-base leading-none font-light">−</span>
                            </button>
                            <span class="text-sm font-normal text-center" style="min-width: 16px; color: #000000;">
                              ${item.quantity}
                            </span>
                            <button onclick="handleQuantityChange(${itemIndex}, 1)" class="flex items-center justify-center rounded" style="width: 26px; height: 26px; border: 1px solid #E5E5E5; color: #000000; background-color: #FFFFFF;">
                              <span class="text-base leading-none font-light">+</span>
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Linha 2: Prazo de entrega e frete -->
                    <div class="flex items-center justify-between" style="font-size: 11px;">
                      <div style="color: #000000; line-height: 1.2;">
                        <span id="delivery-date-${item.id || 'item'}"></span>
                      </div>
                      <div class="flex items-center" style="gap: 6px; margin-top: 1px;">
                        <span class="font-semibold" style="font-size: 11px; color: #000000;">
                          R$ ${fixedShippingPrice}
                        </span>
                        <span class="line-through" style="font-size: 11px; color: #939393;">
                          R$ 18,32
                        </span>
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <!-- Separador pequeno -->
          <div class="h-1"></div>

          <!-- Resumo do pedido -->
          <div class="mb-1 overflow-hidden bg-white">
            <div class="px-5 py-4">
              <span class="font-medium text-gray-900">Resumo do pedido</span>
            </div>
            
            <!-- Subtotal do produto -->
            <div class="px-5">
              <div class="w-full flex items-center justify-between py-2">
                <span class="text-sm text-gray-900">Subtotal do produto</span>
                <span class="text-sm font-medium text-gray-900">R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
              </div>
              <div class="pl-4 pb-3 space-y-1.5 text-sm">
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Preço original</span>
                  <span style="color: #9CA3AF;">R$ ${originalPrice.toFixed(2).replace('.', ',')}</span>
                </div>
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Desconto no produto</span>
                  <span style="color: #FE2C55;">- R$ ${productDiscount.toFixed(2).replace('.', ',')}</span>
                </div>
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Cupons de vendedor</span>
                  <span style="color: #FE2C55;">- R$ ${sellerCoupon.toFixed(2).replace('.', ',')}</span>
                </div>
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Cupons do TikTok Shop</span>
                  <span style="color: #FE2C55;">- R$ ${tiktokCoupon.toFixed(2).replace('.', ',')}</span>
                </div>
              </div>
            </div>

            <!-- Subtotal do envio -->
            <div class="px-5">
              <div class="w-full flex items-center justify-between py-2">
                <span class="text-sm text-gray-900">Subtotal do envio</span>
                <span class="text-sm font-medium text-gray-900">R$ ${shippingSubtotal.toFixed(2).replace('.', ',')}</span>
              </div>
              <div class="pl-4 pb-3 space-y-1.5 text-sm">
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Taxa de envio</span>
                  <span style="color: #9CA3AF;">R$ ${shippingOriginalTotal.toFixed(2).replace('.', ',')}</span>
                </div>
                <div class="flex justify-between">
                  <span style="color: #9CA3AF;">Desconto de envio</span>
                  <span style="color: #FE2C55;">- R$ ${shippingDiscountTotal.toFixed(2).replace('.', ',')}</span>
                </div>
              </div>
            </div>

            <!-- Total dentro do resumo -->
            <div class="px-5 py-3 border-t border-gray-200">
              <div class="flex justify-between items-start">
                <span class="font-semibold text-gray-900">Total</span>
                <div class="text-right">
                  <span class="font-semibold text-gray-900">R$ ${total.toFixed(2).replace('.', ',')}</span>
                  <p class="text-xs" style="color: #9CA3AF;">Impostos inclusos</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Forma de pagamento -->
          <div class="mb-1 p-5 bg-white">
            <h3 class="font-medium mb-3 text-gray-900">Forma de pagamento</h3>
            <div class="flex items-center justify-between py-2 border-b border-gray-200">
              <div class="flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="#4DB6AC" d="M242.4 292.5C247.8 287.1 257.1 287.1 262.5 292.5L339.5 369.5C353.7 383.7 372.6 391.5 392.6 391.5H407.7L310.6 488.6C280.3 518.1 231.1 518.1 200.8 488.6L103.3 391.2H112.6C132.6 391.2 151.5 383.4 165.7 369.2L242.4 292.5zM262.5 218.9C257.1 224.4 247.7 224.5 242.4 218.9L165.7 142.2C151.5 127.1 132.6 120.2 112.6 120.2H103.3L200.7 22.76C231.1-7.586 280.3-7.586 310.6 22.76L407.8 119.9H392.6C372.6 119.9 353.7 127.7 339.5 141.9L262.5 218.9zM112.6 142.7C126.4 142.7 139.1 148.3 149.7 158.1L226.4 234.8C233.6 241.1 243 245.7 252.5 245.7C261.9 245.7 271.3 241.1 278.5 234.8L355.5 157.8C365.3 148.1 378.8 142.5 392.6 142.5H430.3L488.6 200.8C518.1 231.1 518.1 280.3 488.6 310.6L430.3 368.9H392.6C378.8 368.9 365.3 363.3 355.5 353.5L278.5 276.5C264.6 262.6 240.3 262.6 226.4 276.6L149.7 353.2C139.1 363 126.4 368.6 112.6 368.6H80.78L22.76 310.6C-7.586 280.3-7.586 231.1 22.76 200.8L80.78 142.7H112.6z"/>
                </svg>
                <span class="text-gray-900">Pix</span>
              </div>
              <div class="w-5 h-5 rounded-full flex items-center justify-center" style="border: 2px solid #FE2C55;">
                <div class="w-2.5 h-2.5 rounded-full" style="background-color: #FE2C55;"></div>
              </div>
            </div>
          </div>

          <!-- Mensagem de economia -->
          <div class="mb-4 px-3 py-2.5 flex items-center gap-1.5" style="background-color: #FEF2F2;">
            <img 
              src="assets/savings-icon.png" 
              alt="" 
              class="select-none pointer-events-none flex-shrink-0"
              style="width: 18px; height: 18px; user-select: none; pointer-events: none;"
              draggable="false"
            />
            <span class="text-xs whitespace-nowrap" style="color: #FE2C55;">
              Você está economizando R$ ${savings.toFixed(2).replace('.', ',')} nesse pedido.
            </span>
          </div>
        </div>

        <!-- Footer fixo -->
        <div class="fixed bottom-0 left-0 right-0 bg-white">
          <div class="max-w-[480px] mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
              <span class="text-sm font-medium" style="color: #111827;">Total (${totalQuantity} ${totalQuantity === 1 ? 'item' : 'itens'})</span>
              <span class="text-lg font-bold" style="color: #FE2C55;">R$ ${total.toFixed(2).replace('.', ',')}</span>
            </div>
            <button 
              onclick="handleFazerPedido()" 
              class="w-full py-2.5 text-base font-semibold rounded-lg text-white flex flex-col items-center justify-center gap-0"
              style="background-color: #FE2C55; line-height: 1.2;"
            >
              <span style="line-height: 1.2;">Fazer pedido</span>
              <span id="timer" class="text-xs font-normal" style="line-height: 1.2;">Oferta Relâmpago termina em 5:00</span>
            </button>
          </div>
        </div>
      `;

      // Adicionar máscara de CPF
      const cpfInput = document.getElementById('cpf-input');
      if (cpfInput) {
        cpfInput.addEventListener('input', (e) => {
          e.target.value = formatCPF(e.target.value);
        });
      }

      updateTimer();
      updateDeliveryDates(); // Atualizar datas de entrega após renderizar
    }

    document.addEventListener('DOMContentLoaded', renderPage);

    // Pixel: InitiateCheckout quando o checkout abre (cliente entrou na etapa de pagamento)
    document.addEventListener('DOMContentLoaded', () => {
      try {
        if (window.ttq && typeof window.ttq.track === 'function') {
          const items = JSON.parse(localStorage.getItem('cartItems') || '[]');
          if (items.length > 0) {
            const totals = (typeof calculateTotals === 'function') ? calculateTotals() : { total: 0 };
            window.ttq.track('InitiateCheckout', {
              value: Number(totals.total) || 0,
              currency: 'BRL',
              contents: items.map(it => ({
                content_id: String(it.id || it.title || 'product'),
                content_name: String(it.title || 'Produto'),
                quantity: Number(it.quantity || 1),
                price: Number(it.price || 0),
              })),
            });
            console.log('[Pixel] InitiateCheckout fired (checkout)');
          }
        }
      } catch (e) { console.error('[Pixel] AddToCart error:', e); }
    });
  </script>
  
</body>
</html>
